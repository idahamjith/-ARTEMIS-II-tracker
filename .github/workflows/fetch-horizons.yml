name: Fetch Horizons Telemetry

on:
  schedule:
    # Every 5 minutes
    - cron: '*/5 * * * *'
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit data.json back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Fetch Artemis II telemetry from JPL Horizons
        run: |
          python3 << 'EOF'
          import urllib.request
          import urllib.parse
          import json
          import datetime
          import math
          import sys

          HORIZONS = "https://ssd.jpl.nasa.gov/api/horizons.api"
          COMMAND  = "-1024"   # Artemis II (Orion "Integrity")

          now   = datetime.datetime.utcnow()
          t0    = (now - datetime.timedelta(minutes=1)).strftime("%Y-%m-%d %H:%M")
          t1    = (now + datetime.timedelta(minutes=1)).strftime("%Y-%m-%d %H:%M")

          params = urllib.parse.urlencode({
              "format":     "text",
              "COMMAND":    f"'{COMMAND}'",
              "OBJ_DATA":   "'NO'",
              "MAKE_EPHEM": "'YES'",
              "EPHEM_TYPE": "'VECTORS'",
              "CENTER":     "'500@399'",   # Earth geocenter
              "START_TIME": f"'{t0}'",
              "STOP_TIME":  f"'{t1}'",
              "STEP_SIZE":  "'1 m'",
              "OUT_UNITS":  "'KM-S'",
              "CSV_FORMAT": "'YES'",
              "VEC_TABLE":  "'3'",         # X Y Z VX VY VZ LT RG RR
          })

          url = f"{HORIZONS}?{params}"
          print(f"Fetching: {url[:120]}...")

          try:
              with urllib.request.urlopen(url, timeout=20) as resp:
                  text = resp.read().decode("utf-8")
          except Exception as e:
              print(f"Fetch failed: {e}", file=sys.stderr)
              sys.exit(1)

          # Parse CSV block between $$SOE and $$EOE
          soe = text.find("$$SOE")
          eoe = text.find("$$EOE")
          if soe < 0 or eoe < 0:
              print("ERROR: no ephemeris data in response", file=sys.stderr)
              print(text[:500])
              sys.exit(1)

          rows = [l.strip() for l in text[soe+5:eoe].strip().splitlines() if l.strip()]
          if not rows:
              print("ERROR: no data rows", file=sys.stderr)
              sys.exit(1)

          # VEC_TABLE=3 columns: JDTDB, CalDate, X, Y, Z, VX, VY, VZ, LT, RG, RR
          parts = [p.strip() for p in rows[0].split(",")]
          x,  y,  z  = float(parts[2]),  float(parts[3]),  float(parts[4])
          vx, vy, vz = float(parts[5]),  float(parts[6]),  float(parts[7])
          rg         = float(parts[9])   # range from Earth center (km)
          rr         = float(parts[10])  # range-rate (km/s)
          speed      = math.sqrt(vx**2 + vy**2 + vz**2)

          # Simplified Moon ECI position (accurate ~500 km)
          T     = (now.timestamp() - 946728000) / (36525 * 86400)
          L0    = (218.3164477 + 481267.88123421 * T) % 360
          M     = (357.5291092 +  35999.0502909  * T) % 360
          Mm    = (134.9633964 + 477198.8676313  * T) % 360
          F     = ( 93.2720950 + 483202.0175233  * T) % 360
          D     = (297.8501921 + 445267.1114034  * T) % 360
          d2r   = math.pi / 180
          lon   = (L0 + 6.289*math.sin(Mm*d2r) - 1.274*math.sin((2*D-Mm)*d2r)
                      + 0.658*math.sin(2*D*d2r) - 0.214*math.sin(2*Mm*d2r)
                      - 0.186*math.sin(M*d2r))
          lat   = 5.128*math.sin(F*d2r) + 0.280*math.sin((Mm+F)*d2r)
          dist  = (385001 - 20905*math.cos(Mm*d2r) - 3699*math.cos((2*D-Mm)*d2r)
                          -  2956*math.cos(2*D*d2r))
          mx    = dist * math.cos(lat*d2r) * math.cos(lon*d2r)
          my    = dist * math.cos(lat*d2r) * math.sin(lon*d2r)
          mz    = dist * math.sin(lat*d2r)
          moon_dist = math.sqrt((x-mx)**2 + (y-my)**2 + (z-mz)**2)

          data = {
              "fetchedAt":  now.isoformat() + "Z",
              "fetchedAtMs": int(now.timestamp() * 1000),
              "x":  x,  "y":  y,  "z":  z,
              "vx": vx, "vy": vy, "vz": vz,
              "rg":       rg,
              "rr":       rr,
              "speed":    speed,
              "moonDist": moon_dist,
          }

          with open("data.json", "w") as f:
              json.dump(data, f, indent=2)

          print(f"OK — Earth dist: {rg:,.0f} km  Moon dist: {moon_dist:,.0f} km  Speed: {speed*3600:,.0f} km/h")
          EOF

      - name: Commit data.json
        run: |
          git config user.name  "Horizons Bot"
          git config user.email "horizons-bot@users.noreply.github.com"
          git add data.json
          # Only commit if data.json actually changed
          git diff --cached --quiet || git commit -m "chore: update telemetry $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git push
